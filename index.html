<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정수의 뺄셈 챌린지</title>
    <style>
        body { margin: 0; padding: 20px; background-color: #eceff1; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        #SUB_GAME { font-family: 'Malgun Gothic', sans-serif; text-align: center; background-color: #ffffff; padding: 20px; border-radius: 20px; border: 4px solid #455a64; width: 100%; max-width: 400px; box-sizing: border-box; min-height: 600px; position: relative; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .scr { display: none; }
        .scr.on { display: block; }
        #t-bar-box { width: 100%; height: 12px; background: #cfd8dc; border-radius: 6px; margin-bottom: 15px; overflow: hidden; border: 1px solid #546e7a; }
        #t-bar-inner { width: 100%; height: 100%; background: linear-gradient(90deg, #78909c, #455a64); transition: width 0.1s linear; }
        .st-bar { display: flex; justify-content: space-around; font-weight: bold; margin-bottom: 15px; color: #263238; font-size: 1.1rem; }
        .pr { font-size: 2.8rem; font-weight: bold; margin: 30px 0; min-height: 100px; display: flex; align-items: center; justify-content: center; color: #333; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .opt-btn { font-size: 1.6rem; padding: 18px 5px; background: #fff; border: 2px solid #455a64; border-radius: 12px; cursor: pointer; font-weight: bold; color: #37474f; transition: 0.2s; }
        #fb-msg { margin-top:20px; font-weight:bold; min-height: 4.5em; font-size: 1.2rem; line-height: 1.6; display: flex; align-items: center; justify-content: center; border: 2px dashed #455a64; border-radius: 10px; background: #fdfdfd; padding: 10px; }
        .start-btn { font-size: 1.8rem; padding: 15px 40px; background: #455a64; color: white; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; margin-top: 50px; }
        .re-btn { font-size: 1.2rem; padding: 15px; background: #263238; color: white; border: none; border-radius: 10px; cursor: pointer; width: 100%; margin-top: 20px; }
    </style>
</head>
<body>
<div id="SUB_GAME">
    <audio id="bgm" loop preload="auto" src="bgm.mp3"></audio>

    <div id="S_START" class="scr on">
        <h2 style="color:#263238; margin-top: 40px;">⏱️ 정수의 뺄셈 챌린지</h2>
        <p style="color:gray; line-height:1.6;">부호의 변화를 정확히 계산하세요!<br><span style="color:#d32f2f; font-weight:bold;">※ 오답 시 점수가 감점됩니다.</span></p>
        <button id="GO_BTN" class="start-btn">시작하기!</button>
    </div>

    <div id="S_QUIZ" class="scr">
        <div id="t-bar-box"><div id="t-bar-inner"></div></div>
        <div class="st-bar">
            <div>점수: <span id="SCORE_VAL">0</span></div>
            <div>시간: <span id="TIME_VAL">60</span>초</div>
        </div>
        <div id="P_TXT" class="pr"></div>
        <div id="O_BOX" class="btn-grid"></div>
        <div id="fb-msg">신중하게 선택하세요!</div>
    </div>

    <div id="S_RES" class="scr">
        <h2 style="color:#263238;">🏁 결과 확인</h2>
        <p style="font-size: 2rem; margin: 10px 0;">최종 점수: <span id="FINAL_SCORE" style="color:red;">0</span>점</p>
        <button id="RE_BTN" class="re-btn">다시 도전하기</button>
    </div>
</div>

<script>
(function() {
    var ans = 0, score = 0, timeLeft = 60, timer = null, isPaused = false;
    const bgm = document.getElementById('bgm');

    function init() {
        document.getElementById('S_START').classList.remove('on');
        document.getElementById('S_RES').classList.remove('on');
        document.getElementById('S_QUIZ').classList.add('on');
        score = 0; timeLeft = 60; isPaused = false;
        bgm.volume = 0.3;
        bgm.play().catch(e => {});
        updateUI();
        make();
        if(timer) clearInterval(timer);
        timer = setInterval(function() {
            if(!isPaused) {
                timeLeft--;
                updateUI();
                if(timeLeft <= 0) endGame();
            }
        }, 1000);
    }

    function updateUI() {
        document.getElementById('SCORE_VAL').innerText = score;
        document.getElementById('TIME_VAL').innerText = timeLeft;
        document.getElementById('t-bar-inner').style.width = (timeLeft / 60 * 100) + "%";
    }

    function make() {
        isPaused = false;
        document.getElementById('fb-msg').innerHTML = "정답을 고르세요!";
        document.getElementById('fb-msg').style.backgroundColor = "#fdfdfd";
        
        // 숫자 범위 -10 ~ 10
        var n1 = Math.floor(Math.random() * 21) - 10;
        var n2 = Math.floor(Math.random() * 21) - 10; if(n2==0) n2 = 4;
        
        var s1 = (n1 >= 0) ? "(+" + n1 + ")" : "(" + n1 + ")";
        var s2 = (n2 >= 0) ? "(+" + n2 + ")" : "(" + n2 + ")";
        
        document.getElementById('P_TXT').innerText = s1 + " − " + s2;
        ans = n1 - n2;
        
        var os = [ans];
        while(os.length < 4) {
            var w = ans + (Math.floor(Math.random() * 11) - 5);
            if(os.indexOf(w) === -1) os.push(w);
        }
        os.sort(() => Math.random() - 0.5);

        var box = document.getElementById('O_BOX'); box.innerHTML = "";
        os.forEach(v => {
            var btn = document.createElement('button');
            btn.className = 'opt-btn'; btn.innerText = (v > 0) ? "+" + v : v;
            btn.onclick = () => { if(!isPaused) check(v); };
            box.appendChild(btn);
        });
    }

    function check(v) {
        const fb = document.getElementById('fb-msg');
        if(v === ans) {
            isPaused = true; 
            score += 100;
            fb.innerHTML = "<span style='color:blue;'>정답! +100 ✨</span>";
            fb.style.backgroundColor = "#e8f5e9";
            setTimeout(() => { make(); }, 800); 
        } else {
            score = Math.max(0, score - 100);
            fb.innerHTML = "<span style='color:red;'>오답! -100점 💀<br>정답: " + ((ans > 0) ? "+" + ans : ans) + "</span>";
            fb.style.backgroundColor = "#ffebee";
            
            const btns = document.querySelectorAll('.opt-btn');
            btns.forEach(b => b.style.opacity = "0.5");
            
            setTimeout(() => { make(); }, 2000); 
        }
        updateUI();
    }

    function endGame() {
        clearInterval(timer);
        bgm.pause();
        document.getElementById('S_QUIZ').classList.remove('on');
        document.getElementById('S_RES').classList.add('on');
        document.getElementById('FINAL_SCORE').innerText = score;
    }

    document.getElementById('GO_BTN').onclick = init;
    document.getElementById('RE_BTN').onclick = init;
})();
</script>
</body>
</html>
