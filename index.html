<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정수의 뺄셈 챌린지</title>
    <style>
        body { margin: 0; padding: 20px; background-color: #e0f2f1; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        #SUB_CHALLENGE { font-family: 'Malgun Gothic', sans-serif; text-align: center; background-color: #ffffff; padding: 20px; border-radius: 20px; border: 4px solid #009688; width: 100%; max-width: 380px; box-sizing: border-box; min-height: 580px; position: relative; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .scr { display: none; }
        .scr.on { display: block; }
        #t-bar-box { width: 100%; height: 12px; background: #b2dfdb; border-radius: 6px; margin-bottom: 15px; overflow: hidden; border: 1px solid #00796b; }
        #t-bar-inner { width: 100%; height: 100%; background: linear-gradient(90deg, #4db6ac, #009688); transition: width 0.1s linear; }
        .st-bar { display: flex; justify-content: space-around; font-weight: bold; margin-bottom: 15px; color: #004d40; font-size: 1.1rem; }
        .pr { font-size: 2.8rem; font-weight: bold; margin: 30px 0; min-height: 80px; display: flex; align-items: center; justify-content: center; color: #333; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .opt-btn { font-size: 1.6rem; padding: 18px; background: #fff; border: 2px solid #009688; border-radius: 12px; cursor: pointer; font-weight: bold; color: #00796b; transition: 0.2s; }
        #fb-msg { margin-top:20px; font-weight:bold; min-height: 4.5em; font-size: 1.2rem; line-height: 1.6; display: flex; align-items: center; justify-content: center; border: 2px dashed #009688; border-radius: 10px; background: #f9f9f9; padding: 10px; }
        .start-btn { font-size: 1.8rem; padding: 15px 40px; background: #009688; color: white; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; margin-top: 40px; box-shadow: 0 4px 0 #00796b; }
        .re-btn { font-size: 1.2rem; padding: 15px; background: #004d40; color: white; border: none; border-radius: 10px; cursor: pointer; width: 100%; margin-top: 20px; }
        #snd-ctrl { position: absolute; top: 15px; right: 15px; cursor: pointer; font-size: 1.5rem; z-index: 10; }
    </style>
</head>
<body>
<div id="SUB_CHALLENGE">
    <div id="snd-ctrl">🔊</div>
    
    <audio id="bgm" loop preload="auto" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-17.mp3"></audio>

    <div id="S_START" class="scr on">
        <h2 style="color:#00796b; margin-top: 40px;">⏱️ 정수의 뺄셈 챌린지</h2>
        <p style="color:gray;">정답을 맞히면 점수 확인(0.8초),<br>틀리면 정답 확인(2초)!</p>
        <button id="GO_BTN" class="start-btn">시작하기!</button>
    </div>

    <div id="S_QUIZ" class="scr">
        <div id="t-bar-box"><div id="t-bar-inner"></div></div>
        <div class="st-bar">
            <div>점수: <span id="SCORE_VAL">0</span></div>
            <div>시간: <span id="TIME_VAL">60</span>초</div>
        </div>
        <div id="P_TXT" class="pr"></div>
        <div id="O_BOX" class="btn-grid"></div>
        <div id="fb-msg">정답을 선택하세요!</div>
    </div>

    <div id="S_RES" class="scr">
        <h2 style="color:#00796b;">🏁 타임 오버!</h2>
        <p style="font-size: 2rem; margin: 10px 0;">최종 점수: <span id="FINAL_SCORE" style="color:red;">0</span>점</p>
        <p id="RANK_MSG" style="font-weight:bold; color:#004d40;"></p>
        <button id="RE_BTN" class="re-btn">다시 도전!</button>
    </div>
</div>

<script>
(function() {
    var ans = 0, score = 0, timeLeft = 60, timer = null, isPaused = false, isMuted = false;
    const bgm = document.getElementById('bgm');
    const ctrl = document.getElementById('snd-ctrl');

    bgm.volume = 0.3;

    ctrl.onclick = function() {
        isMuted = !isMuted;
        bgm.muted = isMuted;
        ctrl.innerText = isMuted ? "🔇" : "🔊";
    };

    function init() {
        document.getElementById('S_START').classList.remove('on');
        document.getElementById('S_RES').classList.remove('on');
        document.getElementById('S_QUIZ').classList.add('on');
        score = 0; timeLeft = 60; isPaused = false;
        
        // 배경음 재생 (에러 방지 로직 추가)
        if(!isMuted) {
            var playPromise = bgm.play();
            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    console.log("자동 재생이 차단되었습니다.");
                });
            }
        }
        
        updateUI();
        make();
        if(timer) clearInterval(timer);
        timer = setInterval(function() {
            if(!isPaused) {
                timeLeft--;
                updateUI();
                if(timeLeft <= 0) endGame();
            }
        }, 1000);
    }

    function updateUI() {
        document.getElementById('SCORE_VAL').innerText = score;
        document.getElementById('TIME_VAL').innerText = timeLeft;
        var per = (timeLeft / 60) * 100;
        document.getElementById('t-bar-inner').style.width = per + "%";
        if(timeLeft <= 10) document.getElementById('t-bar-inner').classList.add('timer-low');
        else document.getElementById('t-bar-inner').classList.remove('timer-low');
    }

    function make() {
        isPaused = false;
        document.getElementById('fb-msg').innerHTML = "정답을 고르세요!";
        document.getElementById('fb-msg').style.backgroundColor = "#f9f9f9";
        
        var n1 = Math.floor(Math.random() * 21) - 10;
        var n2 = Math.floor(Math.random() * 21) - 10; if(n2==0) n2 = 5;
        
        var s1 = (n1 >= 0) ? "(+" + n1 + ")" : "(" + n1 + ")";
        var s2 = (n2 >= 0) ? "(+" + n2 + ")" : "(" + n2 + ")";
        
        document.getElementById('P_TXT').innerText = s1 + " − " + s2;
        ans = n1 - n2;
        
        var os = [ans];
        while(os.length < 4) {
            var w = ans + (Math.floor(Math.random() * 11) - 5);
            if(os.indexOf(w) === -1) os.push(w);
        }
        os.sort(function(){return 0.5 - Math.random();});

        var box = document.getElementById('O_BOX'); box.innerHTML = "";
        os.forEach(function(v) {
            var btn = document.createElement('button');
            btn.className = 'opt-btn'; btn.innerText = v;
            btn.onclick = function() { if(!isPaused) check(v); };
            box.appendChild(btn);
        });
    }

    function check(v) {
        var fb = document.getElementById('fb-msg');
        if(v === ans) {
            isPaused = true;
            score += 100;
            fb.innerHTML = "<span style='color:blue;'>정답! +100 ✨</span>";
            fb.style.backgroundColor = "#e8f5e9";
            setTimeout(function() {
                isPaused = false;
                make();
            }, 800); 
        } else {
            isPaused = true;
            fb.innerHTML = "<span style='color:red;'>오답! 정답은 <b>" + ans + "</b></span>";
            fb.style.backgroundColor = "#ffebee";
            setTimeout(make, 2000); 
        }
    }

    function endGame() {
        clearInterval(timer);
        bgm.pause();
        document.getElementById('S_QUIZ').classList.remove('on');
        document.getElementById('S_RES').classList.add('on');
        document.getElementById('FINAL_SCORE').innerText = score;
        var msg = score >= 2000 ? "🎖️ 뺄셈의 지배자!" : score >= 1000 ? "🥇 정말 훌륭해요!" : "🥈 조금만 더 연습해봐요!";
        document.getElementById('RANK_MSG').innerText = msg;
    }

    document.getElementById('GO_BTN').onclick = init;
    document.getElementById('RE_BTN').onclick = init;
})();
</script>
</body>
</html>
