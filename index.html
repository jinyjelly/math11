        .scr { display: none; }

        .pr { font-size: 2.8rem; font-weight: bold; margin: 30px 0; min-height: 80px; display: flex; align-items: center; justify-content: center; color: #333; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .opt-btn { font-size: 1.6rem; padding: 18px; background: #fff; border: 2px solid #009688; border-radius: 12px; cursor: pointer; font-weight: bold; color: #00796b; transition: 0.2s; }
        
        #fb-msg { margin-top:20px; font-weight:bold; min-height: 4.5em; font-size: 1.2rem; line-height: 1.6; display: flex; align-items: center; justify-content: center; border: 2px dashed #009688; border-radius: 10px; background: #f9f9f9; padding: 10px; transition: background-color 0.3s; }
        .timer-low { background: linear-gradient(90deg, #ff5252, #d32f2f) !important; }
        
        .start-btn { font-size: 1.8rem; padding: 15px 40px; background: #009688; color: white; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; margin-top: 40px; box-shadow: 0 4px 0 #00796b; }
        .re-btn { font-size: 1.2rem; padding: 15px; background: #004d40; color: white; border: none; border-radius: 10px; cursor: pointer; width: 100%; margin-top: 20px; }
        #snd-ctrl { position: absolute; top: 15px; right: 15px; cursor: pointer; font-size: 1.5rem; z-index: 10; }
    </style>
</head>

</div>
