<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정수의 뺄셈 1분 챌린지</title>
    <style>
        body { margin: 0; padding: 20px; background-color: #e0f2f1; display: flex; justify-content: center; }
        #SUB_CHALLENGE { font-family: 'Malgun Gothic', sans-serif; text-align: center; background-color: #ffffff; padding: 20px; border-radius: 20px; border: 4px solid #009688; width: 100%; max-width: 380px; box-sizing: border-box; min-height: 560px; position: relative; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .scr { display: none; }
        .scr.on { display: block; }
        
        #t-bar-box { width: 100%; height: 12px; background: #b2dfdb; border-radius: 6px; margin-bottom: 15px; overflow: hidden; border: 1px solid #00796b; }
        #t-bar-inner { width: 100%; height: 100%; background: linear-gradient(90deg, #4db6ac, #009688); transition: width 0.1s linear; }
        
        .st-bar { display: flex; justify-content: space-around; font-weight: bold; margin-bottom: 15px; color: #004d40; font-size: 1.1rem; }
        .pr { font-size: 2.5rem; font-weight: bold; margin: 30px 0; min-height: 80px; display: flex; align-items: center; justify-content: center; color: #333; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .opt-btn { font-size: 1.5rem; padding: 15px; background: #fff; border: 2px solid #009688; border-radius: 12px; cursor: pointer; font-weight: bold; color: #00796b; transition: 0.2s; }
        .opt-btn:active { transform: scale(0.95); background: #e0f2f1; }
        
        #fb-msg { margin-top:15px; font-weight:bold; min-height: 3.5em; font-size: 1.1rem; line-height: 1.5; display: flex; align-items: center; justify-content: center; border-top: 1px dashed #009688; padding-top: 10px; }
        .timer-low { background: linear-gradient(90deg, #ff5252, #d32f2f) !important; }
        
        .start-btn { font-size: 1.8rem; padding: 15px 40px; background: #009688; color: white; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; margin-top: 40px; }
        .re-btn { font-size: 1.2rem; padding: 15px; background: #004d40; color: white; border: none; border-radius: 10px; cursor: pointer; width: 100%; margin-top: 20px; }
        #snd-ctrl { position: absolute; top: 15px; right: 15px; cursor: pointer; font-size: 1.5rem; z-index: 10; }
    </style>
</head>
<body>
<div id="SUB_CHALLENGE">
    <div id="snd-ctrl">🔊</div>
    
    <audio id="bgm" loop src="https://pixabay.com/music/download/145459/"></audio>
    <audio id="snd-ok" src="https://t1.daumcdn.net/kakaocorp/kakaocorp/admin/service/1591851241103_6861.mp3"></audio>
    <audio id="snd-no" src="https://t1.daumcdn.net/kakaocorp/kakaocorp/admin/service/1591851253457_1338.mp3"></audio>

    <div id="S_START" class="scr on">
        <h2 style="color:#00796b;">⏱️ 정수의 뺄셈 챌린지</h2>
        <p style="color:gray;">제한 시간 60초!<br>틀리면 정답이 2초간 공개됩니다.</p>
        <button id="GO_BTN" class="start-btn">도전 시작!</button>
    </div>

    <div id="S_QUIZ" class="scr">
        <div id="t-bar-box"><div id="t-bar-inner"></div></div>
        <div class="st-bar">
            <div>점수: <span id="SCORE_VAL">0</span></div>
            <div>시간: <span id="TIME_VAL">60</span>초</div>
        </div>
        <div id="P_TXT" class="pr"></div>
        <div id="O_BOX" class="btn-grid"></div>
        <div id="fb-msg"></div>
    </div>

    <div id="S_RES" class="scr">
        <h2 style="color:#00796b;">🏁 타임 오버!</h2>
        <p style="font-size: 2rem; margin: 10px 0;">최종 점수: <span id="FINAL_SCORE" style="color:red;">0</span>점</p>
        <p id="RANK_MSG" style="font-weight:bold; color:#004d40; margin-bottom: 20px;"></p>
        <button id="RE_BTN" class="re-btn">다시 도전하기</button>
    </div>
</div>

<script>
(function() {
    var ans = 0, score = 0, timeLeft = 60, timer = null, isPaused = false, isMuted = false;
    const bgm = document.getElementById('bgm');
    const sOk = document.getElementById('snd-ok');
    const sNo = document.getElementById('snd-no');
    const ctrl = document.getElementById('snd-ctrl');

    ctrl.onclick = function() {
        isMuted = !isMuted;
        bgm.muted = isMuted; sOk.muted = isMuted; sNo.muted = isMuted;
        ctrl.innerText = isMuted ? "🔇" : "🔊";
    };

    function init() {
        document.getElementById('S_START').classList.remove('on');
        document.getElementById('S_RES').classList.remove('on');
        document.getElementById('S_QUIZ').classList.add('on');
        score = 0; timeLeft = 60; isPaused = false;
        if(!isMuted) bgm.play();
        updateUI();
        make();
        if(timer) clearInterval(timer);
        timer = setInterval(function() {
            if(!isPaused) {
                timeLeft--;
                updateUI();
                if(timeLeft <= 0) endGame();
            }
        }, 1000);
    }

    function updateUI() {
        document.getElementById('SCORE_VAL').innerText = score;
        document.getElementById('TIME_VAL').innerText = timeLeft;
        var per = (timeLeft / 60) * 100;
        document.getElementById('t-bar-inner').style.width = per + "%";
        if(timeLeft <= 10) document.getElementById('t-bar-inner').classList.add('timer-low');
        else document.getElementById('t-bar-inner').classList.remove('timer-low');
    }

    function make() {
        isPaused = false;
        document.getElementById('fb-msg').innerHTML = "";
        var n1 = Math.floor(Math.random() * 21) - 10;
        var n2 = Math.floor(Math.random() * 21) - 10; if(n2==0) n2 = 5;
        
        var s1 = (n1 >= 0) ? "(+" + n1 + ")" : "(" + n1 + ")";
        var s2 = (n2 >= 0) ? "(+" + n2 + ")" : "(" + n2 + ")";
        
        document.getElementById('P_TXT').innerText = s1 + " − " + s2;
        ans = n1 - n2;
        
        var os = [ans];
        while(os.length < 4) {
            var w = ans + (Math.floor(Math.random() * 11) - 5);
            if(os.indexOf(w) === -1) os.push(w);
        }
        os.sort(function(){return 0.5 - Math.random();});

        var box = document.getElementById('O_BOX'); box.innerHTML = "";
        os.forEach(function(v) {
            var btn = document.createElement('button');
            btn.className = 'opt-btn'; btn.innerText = v;
            btn.onclick = function() { if(!isPaused) check(v); };
            box.appendChild(btn);
        });
    }

    function check(v) {
        var fb = document.getElementById('fb-msg');
        if(v === ans) {
            score += 100;
            if(!isMuted) sOk.play();
            fb.innerHTML = "<span style='color:blue;'>정답! +100 ✨</span>";
            setTimeout(make, 300);
        } else {
            isPaused = true;
            if(!isMuted) sNo.play();
            fb.innerHTML = "<span style='color:red;'>오답! 🧐 정답은:</span><br>" + ans;
            setTimeout(make, 2000); // 2000ms = 2초로 변경
        }
    }

    function endGame() {
        clearInterval(timer);
        bgm.pause();
        document.getElementById('S_QUIZ').classList.remove('on');
        document.getElementById('S_RES').classList.add('on');
        document.getElementById('FINAL_SCORE').innerText = score;
        var msg = score >= 2000 ? "🎖️ 뺄셈의 달인이시군요!" : score >= 1000 ? "🥇 정말 훌륭합니다!" : "🥈 조금만 더 연습해봐요!";
        document.getElementById('RANK_MSG').innerText = msg;
    }

    document.getElementById('GO_BTN').onclick = init;
    document.getElementById('RE_BTN').onclick = init;
})();
</script>
</body>
</html>
